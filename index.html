<style>
/* ================================================
   DESIGN TOKENS — Dusty Rose · Parchment · Gold
   ================================================ */
:root {
  --rose:     #C8929A;
  --rose-d:   #A67078;
  --rose-l:   #EDD8DA;
  --cream:    #FAF7F2;
  --paper:    #F5EFE6;
  --gold:     #C9A96E;
  --gold-l:   #E8D5B0;
  --ink:      #2E2020;
  --ink-m:    #5C4848;
  --ink-l:    #8A7070;
  --white:    #FEFEFE;

  --f-display: 'Cormorant Garamond', Georgia, serif;
  --f-body:    'DM Sans', system-ui, sans-serif;

  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in:  cubic-bezier(0.4, 0, 1, 1);
  --ease:     cubic-bezier(0.4, 0, 0.2, 1);

  --radius-sm: 12px;
  --radius:    24px;
  --radius-lg: 40px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; -webkit-font-smoothing: antialiased; }

body {
  min-height: 100%;
  font-family: var(--f-body);
  font-size: 15px;
  line-height: 1.75;
  color: var(--ink-m);
  background: var(--cream);
  overflow-x: hidden;
}

/* ────────────── NOISE TEXTURE OVERLAY ────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  mix-blend-mode: multiply;
}

/* ────────────── LAYOUT ────────────── */
.app {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 0 0 120px;
}

/* ────────────── HEADER TAG ────────────── */
.who-tag {
  margin: 32px auto 0;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  background: var(--paper);
  border: 1px solid var(--rose-l);
  border-radius: 999px;
  font-family: var(--f-display);
  font-size: 14px;
  font-style: italic;
  color: var(--rose-d);
  letter-spacing: 0.5px;
}
.who-tag::before { content: '❧'; font-style: normal; }
.who-tag::after  { content: '❧'; font-style: normal; }

/* ────────────── STAGE ────────────── */
.stage {
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 24px 16px 8px;
  perspective: 1200px;
}

/* ────────────── CARD ────────────── */
.card {
  width: min(680px, 92vw);
  min-height: clamp(440px, 66vh, 560px);
  background: var(--white);
  border-radius: var(--radius);
  position: relative;
  overflow: hidden;
  box-shadow:
    0 2px 0 rgba(201,169,110,.2),
    0 8px 24px rgba(46,32,32,.04),
    0 24px 60px rgba(46,32,32,.07),
    0 64px 120px rgba(46,32,32,.05);

  border: 1px solid rgba(201,169,110,.25);
  transform-origin: center bottom;
}

.card::before, .card::after {
  content: '';
  position: absolute;
  width: 40px;
  height: 40px;
  border-color: var(--gold-l);
  border-style: solid;
  pointer-events: none;
  z-index: 2;
  opacity: .6;
}
.card::before { top: 18px; left: 18px; border-width: 1px 0 0 1px; border-radius: 4px 0 0 0; }
.card::after  { bottom: 18px; right: 18px; border-width: 0 1px 1px 0; border-radius: 0 0 4px 0; }

/* ────────────── PAGE ANIMATIONS ────────────── */
@keyframes fadeUp   { from { opacity:0; transform:translateY(24px) } to { opacity:1; transform:none } }
@keyframes fadeIn   { from { opacity:0 } to { opacity:1 } }
@keyframes slideIn  { from { opacity:0; transform:translateX(30px) } to { opacity:1; transform:none } }
@keyframes scaleIn  { from { opacity:0; transform:scale(.94) } to { opacity:1; transform:none } }
@keyframes float    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes shimmer  { from{background-position:200% center} to{background-position:-200% center} }
@keyframes blink    { 0%,100%{opacity:0} 50%{opacity:1} }
@keyframes drift    { 0%{transform:translateY(0) rotate(0deg);opacity:.8} 100%{transform:translateY(-120vh) rotate(360deg);opacity:0} }
@keyframes flameDance { 0%,100%{transform:translateX(-50%) scaleX(1)} 33%{transform:translateX(-51%) scaleX(.9) skewX(-2deg)} 66%{transform:translateX(-49%) scaleX(1.05) skewX(1deg)} }
@keyframes letterReveal { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:none } }
@keyframes sealPop { 0%{transform:scale(0) rotate(-15deg);opacity:0} 70%{transform:scale(1.15) rotate(3deg)} 100%{transform:scale(1) rotate(0deg);opacity:1} }
@keyframes unfold { from { opacity:0; transform: scaleY(0.6) translateY(-20px) } to { opacity:1; transform: none } }

.anim-fadeUp  { animation: fadeUp  .7s var(--ease-out) both }
.anim-fadeIn  { animation: fadeIn  .6s ease both }
.anim-slideIn { animation: slideIn .6s var(--ease-out) both }
.anim-scaleIn { animation: scaleIn .5s var(--ease-out) both }

/* ────────────── TYPOGRAPHY ────────────── */
.display { font-family: var(--f-display); font-size: clamp(28px, 6vw, 42px); font-weight: 400; line-height: 1.2; color: var(--ink); letter-spacing: -.3px; }
.display.italic { font-style: italic; }
.heading { font-family: var(--f-display); font-size: clamp(20px, 4vw, 28px); font-weight: 600; color: var(--ink); line-height: 1.3; }
.subtext { font-size: 14.5px; color: var(--ink-l); line-height: 1.8; }
.body-text { font-size: 15px; color: var(--ink-m); line-height: 1.85; }

/* ────────────── DIVIDER ────────────── */
.ornament-line { display: flex; align-items: center; gap: 12px; color: var(--gold); font-size: 16px; opacity: .6; }
.ornament-line::before, .ornament-line::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-l), transparent); }

/* ────────────── BUTTONS ────────────── */
.btn { appearance: none; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; border-radius: 999px; font-family: var(--f-body); font-size: 14px; font-weight: 500; letter-spacing: .3px; transition: all .2s var(--ease); position: relative; overflow: hidden; }
.btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,.2), transparent); pointer-events: none; }
.btn-primary { background: linear-gradient(135deg, var(--rose), var(--rose-d)); color: #fff; box-shadow: 0 4px 20px rgba(200,146,154,.35), 0 1px 0 rgba(255,255,255,.2) inset; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(200,146,154,.45); }
.btn-primary:active { transform: translateY(0); }
.btn-ghost { background: transparent; color: var(--rose-d); border: 1.5px solid var(--rose-l); box-shadow: 0 2px 8px rgba(200,146,154,.1); }
.btn-ghost:hover { background: var(--rose-l); border-color: var(--rose); }

/* ────────────── BOTTOM NAV ────────────── */
.navwrap { position: fixed; bottom: clamp(16px, env(safe-area-inset-bottom,0px) + 20px, 36px); left: 0; right: 0; display: flex; justify-content: center; z-index: 100; pointer-events: none; }
.nav-inner { pointer-events: auto; display: flex; align-items: center; gap: 20px; padding: 10px 20px; background: rgba(250,247,242,.92); backdrop-filter: blur(16px) saturate(1.4); border: 1px solid rgba(201,169,110,.2); border-radius: 999px; box-shadow: 0 8px 32px rgba(46,32,32,.1), 0 2px 0 rgba(255,255,255,.8) inset; }
.nav-btn { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid var(--rose-l); background: var(--white); color: var(--ink-m); font-size: 16px; cursor: pointer; display: grid; place-items: center; transition: all .2s var(--ease); box-shadow: 0 2px 8px rgba(0,0,0,.04); }
.nav-btn:hover:not(:disabled) { background: var(--rose-l); border-color: var(--rose); transform: scale(1.05); }
.nav-btn:disabled { opacity: .3; cursor: not-allowed; }
.nav-count { font-family: var(--f-display); font-size: 15px; font-style: italic; color: var(--ink-m); min-width: 54px; text-align: center; letter-spacing: .5px; }
.progress-bar { position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%); width: min(680px, 88vw); height: 3px; background: rgba(200,146,154,.15); border-radius: 999px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--rose), var(--gold)); border-radius: 999px; transition: width .4s var(--ease-out); }

/* ────────────── MUSIC BTN ────────────── */
.music-btn { position: fixed; top: 20px; right: 20px; z-index: 200; width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(201,169,110,.25); background: rgba(250,247,242,.9); backdrop-filter: blur(8px); font-size: 18px; cursor: pointer; display: none; place-items: center; box-shadow: 0 4px 16px rgba(0,0,0,.08); transition: transform .2s; }
.music-btn:hover { transform: scale(1.08); }

/* ────────────── PAGE CONTENTS ────────────── */
.cover-wrap { position: relative; width: 100%; height: 100%; min-height: inherit; display: grid; place-items: center; overflow: hidden; }
.cover-bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: brightness(.75) saturate(.85); transform: scale(1.05); transition: transform 8s ease; }
.cover-bg.loaded { transform: scale(1); }
.cover-gradient { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(250,247,242,.1) 0%, rgba(200,146,154,.15) 40%, rgba(46,32,32,.55) 100%); }
.cover-content { position: relative; z-index: 2; text-align: center; padding: 32px 28px; display: flex; flex-direction: column; align-items: center; gap: 16px; max-width: 480px; }
.cover-chip { font-family: var(--f-display); font-style: italic; font-size: 13px; color: rgba(255,255,255,.8); letter-spacing: 2px; text-transform: uppercase; border: 1px solid rgba(255,255,255,.3); padding: 5px 16px; border-radius: 999px; background: rgba(255,255,255,.1); backdrop-filter: blur(4px); }
.cover-title { font-family: var(--f-display); font-size: clamp(30px, 7vw, 48px); font-weight: 300; font-style: italic; color: #fff; line-height: 1.15; text-shadow: 0 2px 20px rgba(0,0,0,.3); }
.cover-sub { font-size: 14px; color: rgba(255,255,255,.8); max-width: 320px; line-height: 1.7; }
.petal { position: absolute; pointer-events: none; font-size: 18px; opacity: 0; animation: drift 6s linear infinite; }
.pad { padding: clamp(28px,4vw,44px); }
.pad-center { padding: clamp(28px,4vw,44px); display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; gap: 20px; }
.pad-stack { padding: clamp(24px,4vw,40px); display:flex; flex-direction:column; justify-content:center; height:100%; gap:16px; }
.card-inner { display:flex; flex-direction:column; justify-content:center; height:100%; gap:18px; }
.reason-list { display: flex; flex-direction: column; gap: 10px; width: 100%; }
.reason-item { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; background: var(--paper); border-radius: var(--radius-sm); border-left: 3px solid var(--rose-l); font-size: 14.5px; color: var(--ink-m); opacity: 0; transform: translateX(-10px); transition: all .4s var(--ease-out); }
.reason-item.visible { opacity:1; transform:none; }
.reason-num { font-family: var(--f-display); font-style: italic; font-size: 20px; color: var(--rose-l); line-height: 1; flex-shrink: 0; margin-top: 2px; }
.quiz-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.quiz-chip { font-family: var(--f-display); font-style: italic; font-size: 13px; color: var(--rose-d); background: var(--rose-l); padding: 4px 12px; border-radius: 999px; }
.quiz-dots { display:flex; gap:6px; }
.quiz-dot { width:8px; height:8px; border-radius:50%; background:var(--rose-l); transition:background .3s; }
.quiz-dot.done { background:var(--rose); }
.choices-grid { display:flex; flex-direction:column; gap:10px; margin-top:14px; }
.choice-btn { padding: 14px 18px; border-radius: var(--radius-sm); border: 1.5px solid rgba(200,146,154,.2); background: var(--white); color: var(--ink-m); font-family: var(--f-body); font-size: 14.5px; text-align: left; cursor: pointer; transition: all .2s var(--ease); position: relative; overflow: hidden; }
.choice-btn::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--rose); transform: scaleY(0); transform-origin: center; transition: transform .2s; }
.choice-btn:hover:not(:disabled)::before { transform: scaleY(1); }
.choice-btn:hover:not(:disabled) { border-color: var(--rose); background: var(--paper); transform: translateX(4px); }
.choice-btn:disabled { cursor:default; }
.choice-btn.correct { border-color: #7DAA8A; background: #EDF4F0; color: #3A5E47; font-weight: 500; }
.choice-btn.correct::before { background:#7DAA8A; transform:scaleY(1); }
.choice-btn.wrong { border-color: #C08080; background: #F8EDED; color: #6A3A3A; }
.choice-btn.wrong::before { background:#C08080; transform:scaleY(1); }
.ldr-map { width: 100%; max-height: 200px; border-radius: 16px; overflow: hidden; background: var(--paper); }
.prayer-wrap { font-family: var(--f-display); font-size: clamp(16px,3.5vw,22px); font-style: italic; line-height: 1.9; color: var(--ink-m); text-align: center; max-width: 420px; }
.prayer-char { display: inline; opacity: 0; animation: fadeIn .05s ease forwards; }
.cake-wrap { display: flex; flex-direction: column; align-items: center; gap: 0; position: relative; }
.candle-stick { width: 16px; height: 52px; background: linear-gradient(135deg, var(--rose-l), #E4C4C8); border-radius: 8px 8px 4px 4px; position: relative; box-shadow: inset -2px 0 4px rgba(0,0,0,.06); }
.wax-drip { position: absolute; bottom: -4px; left: 2px; right: 2px; height: 8px; background: linear-gradient(135deg, var(--rose-l), rgba(229,196,200,.6)); border-radius: 0 0 4px 4px; }
.flame-wrap { width: 20px; height: 32px; position: relative; display: flex; justify-content: center; margin-bottom: 2px; }
.flame-outer { width: 18px; height: 30px; background: radial-gradient(ellipse at 50% 70%, #fff7b0, #FFB347 55%, #FF6B35 100%); border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%; position: absolute; bottom: 0; filter: blur(.5px); animation: flameDance 1.2s ease-in-out infinite; transform-origin: bottom center; box-shadow: 0 0 16px 6px rgba(255,180,70,.4); }
.flame-inner { width: 10px; height: 18px; background: radial-gradient(ellipse at 50% 70%, #fff, #fff8d4 70%, rgba(255,255,255,0)); border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%; position: absolute; bottom: 4px; }
.flame-glow { position: absolute; bottom: -4px; width: 30px; height: 30px; border-radius: 50%; background: radial-gradient(circle, rgba(255,200,70,.3), transparent 70%); animation: float 1.5s ease-in-out infinite; }
.flame-wrap.blown .flame-outer, .flame-wrap.blown .flame-inner, .flame-wrap.blown .flame-glow { opacity:0; animation:none; transition: opacity .3s; }
.cake-body { width: 180px; height: 90px; position: relative; background: linear-gradient(180deg, #F2D5D8, #E4BEC3); border-radius: 20px 20px 16px 16px; box-shadow: 0 6px 24px rgba(200,146,154,.2), inset 0 2px 8px rgba(255,255,255,.5); }
.cake-frosting { position: absolute; top: -10px; left: 0; right: 0; height: 20px; background: #FAF0F1; border-radius: 50% 50% 0 0; overflow: hidden; }
.cake-deco { position: absolute; top: 24px; left: 0; right: 0; display: flex; justify-content: center; gap: 12px; font-size: 10px; }
.score-ring { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--rose-l); display: grid; place-items: center; position: relative; margin: 0 auto; }
.score-ring::before { content: ''; position: absolute; inset: 6px; border-radius: 50%; background: linear-gradient(135deg, var(--rose-l), #F9EDEF); }
.score-num { font-family: var(--f-display); font-size: 42px; font-weight: 300; color: var(--rose-d); position: relative; z-index: 1; line-height: 1; }
.promise-list { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 460px; margin: 0 auto; }
.promise-item { display: flex; align-items: center; gap: 12px; padding: 13px 16px; background: var(--paper); border-radius: var(--radius-sm); font-size: 14px; color: var(--ink-m); border: 1px solid rgba(200,146,154,.15); }
.promise-icon { font-size: 18px; flex-shrink: 0; }
.surat-img { max-width: 100%; max-height: 65%; border-radius: 16px; box-shadow: 0 12px 48px rgba(0,0,0,.12); object-fit: contain; transition: transform .4s var(--ease-out); }
.surat-img:hover { transform: scale(1.01); }
.closing-text { font-family: var(--f-display); font-size: clamp(15px,3vw,19px); font-style: italic; line-height: 2; color: var(--ink-m); max-width: 440px; text-align: center; }
.tap-hint { font-size: 12px; color: var(--ink-l); letter-spacing: 1px; text-transform: uppercase; animation: blink 2s ease-in-out infinite; }
.lightbox { position: fixed; inset: 0; background: rgba(30,20,20,.92); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 9000; animation: fadeIn .25s ease; }
.lightbox.open { display: flex; }
.lightbox img { max-width: min(90vw, 600px); max-height: 85vh; border-radius: 16px; box-shadow: 0 24px 80px rgba(0,0,0,.5); }
.lightbox-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); color: #fff; width: 44px; height: 44px; border-radius: 50%; font-size: 18px; cursor: pointer; display: grid; place-items: center; transition: background .2s; }
.lightbox-close:hover { background: rgba(255,255,255,.2); }
#confetti { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:9998; }
footer { font-size: 12.5px; color: var(--ink-l); text-align: center; padding: 16px; font-family: var(--f-display); font-style: italic; opacity: .7; }

/* ── Gift Letter Redesign ── */
.gift-letter-wrap {
  padding: clamp(28px,5vw,48px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100%;
  gap: 0;
  position: relative;
}
.gift-letter-wrap::before {
  content: '🎁';
  position: absolute;
  font-size: 160px;
  opacity: .03;
  bottom: -10px;
  right: -10px;
  pointer-events: none;
  line-height: 1;
  filter: grayscale(1);
}
.letter-label {
  font-family: var(--f-display);
  font-style: italic;
  font-size: 12px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: fadeUp .5s var(--ease-out) both;
}
.letter-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--gold-l), transparent);
}
.letter-body {
  font-family: var(--f-display);
  font-style: italic;
  font-size: clamp(17px, 3.2vw, 22px);
  font-weight: 300;
  line-height: 1.95;
  color: var(--ink-m);
  margin-bottom: 28px;
}
.letter-body span {
  display: inline;
  opacity: 0;
  animation: letterReveal .5s var(--ease-out) both;
}
.letter-highlight {
  color: var(--ink);
  font-weight: 400;
  border-bottom: 1px solid var(--gold-l);
  padding-bottom: 1px;
}
.letter-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 18px;
  border-top: 1px solid rgba(201,169,110,.2);
  animation: fadeUp .5s var(--ease-out) .6s both;
}
.letter-sig {
  font-family: var(--f-display);
  font-size: 18px;
  font-style: italic;
  font-weight: 400;
  color: var(--ink-l);
}
.letter-seal {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--rose-l), #F9EDEF);
  border: 1.5px solid rgba(200,146,154,.3);
  display: grid;
  place-items: center;
  font-size: 22px;
  box-shadow: 0 4px 16px rgba(200,146,154,.15), inset 0 1px 0 rgba(255,255,255,.7);
  animation: sealPop .6s var(--ease-out) .8s both;
  position: relative;
}
.letter-seal::after {
  content: '';
  position: absolute;
  inset: 4px;
  border-radius: 50%;
  border: 1px solid rgba(200,146,154,.2);
}
@media (max-width:480px) { .pad, .pad-center, .pad-stack { padding: 22px 20px; } }
@media (prefers-reduced-motion:reduce) { *, *::before, *::after { animation-duration:.01ms !important; transition-duration:.01ms !important; } }
</style>

<div class="app">
  <div class="who-tag" id="whoTag">Hilhill 🌻</div>
  <div class="stage">
    <div class="card" id="card">
      <section id="page" aria-live="polite" aria-label="halaman"></section>
    </div>
  </div>

function go(n) {
  page = Math.max(1, Math.min(TOTAL, n));
  localStorage.setItem('__p', page);
  render();
  updateNav();
}
function updateNav() {
  $prev.disabled = page <= 1;
  $next.disabled = page >= TOTAL;
  $count.textContent = `${page} / ${TOTAL}`;
  $fill.style.width  = ((page-1)/(TOTAL-1)*100).toFixed(1) + '%';
}
$prev.addEventListener('click', () => go(page-1));
$next.addEventListener('click', () => go(page+1));
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight') go(page+1);
  if(e.key === 'ArrowLeft')  go(page-1);
});
(function(){
  let sx, sy;
  const el = document.querySelector('.stage');
  el.addEventListener('touchstart', e => { sx=e.touches[0].clientX; sy=e.touches[0].clientY; }, {passive:true});
  el.addEventListener('touchend',   e => {
    if(sx==null) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    sx = sy = null;
    if(Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      if(dx < 0) go(page+1); else go(page-1);
    }
  });
})();

function openLB(src) { $lbImg.src = src; $lb.classList.add('open'); }
$lbClose.addEventListener('click', () => $lb.classList.remove('open'));
$lb.addEventListener('click', e => { if(e.target === $lb) $lb.classList.remove('open'); });

$bgm.volume = 0.35;
let musicOn = false;
$bgm.addEventListener('canplay', () => { $music.style.display='grid'; });
$music.addEventListener('click', () => {

  else             { $bgm.pause(); musicOn=false; $music.textContent='🔇'; }
});

function burst(n=110) {
  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  const colors = ['#C8929A','#E4C1C6','#F5EAEB','#C9A96E','#E8D5B0','#8DA996','#D4B8B8'];
  const shapes = ['◆','❋','✿','·','○'];
  for(let i=0; i<n; i++) {
    const el = document.createElement('span');
    el.textContent = shapes[Math.floor(Math.random()*shapes.length)];
    const size = 8 + Math.random()*10;
    Object.assign(el.style, { position:'absolute', top:'-20px', left:(5+Math.random()*90)+'vw', fontSize: size+'px', color: colors[i%colors.length], animation: `drift ${1+Math.random()*2}s linear forwards`, animationDelay: (Math.random()*.6)+'s' });
    $conf.appendChild(el);
    setTimeout(()=>el.remove(), 3500);
  }
}

const driftStyle = document.createElement('style');
driftStyle.textContent = `@keyframes drift{to{transform:translateY(110vh) rotate(720deg);opacity:0}}`;
document.head.appendChild(driftStyle);

function typewrite(el, text, speed=28) {
  el.innerHTML = '';
  let i = 0;
  const tick = () => {
    if(i < text.length) {
      const span = document.createElement('span');
      span.className = 'prayer-char';
      span.style.animationDelay = (i * speed) + 'ms';
      span.textContent = text[i] === '\n' ? '' : text[i];
      if(text[i] === '\n') span.innerHTML = '<br>';
      el.appendChild(span);
      i++;
      requestAnimationFrame(tick);
    }
  };
  tick();
}

function stagger(selector, baseDelay=0, step=120) {
  document.querySelectorAll(selector).forEach((el,i) => {
    el.style.transitionDelay = (baseDelay + i*step) + 'ms';
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));
  });
}

        answers[idx] = chosen;

    });
  });
}

      <div class="cake-wrap anim-scaleIn">
        <div class="flame-wrap" id="flameWrap">
          <div class="flame-glow"></div>
          <div class="flame-outer"></div>
          <div class="flame-inner"></div>
        </div>
        <div class="candle-stick"><div class="wax-drip"></div></div>
        <div class="cake-body">
          <div class="cake-frosting"></div>
          <div class="cake-deco">🌸 ✨ 🌸</div>
        </div>
      </div>
      <h1 class="display italic anim-fadeUp" style="animation-delay:.2s">make a wish ✨</h1>
      <p class="body-text anim-fadeUp" style="animation-delay:.3s;max-width:340px">${C.P18_COPY}</p>
    </div>
  `);

  const fw = document.getElementById('flameWrap');
  let startY = null;
  const onStart = e => { startY = (e.touches?.[0]||e).clientY; };
  const onEnd   = e => {
    if(startY==null) return;
    const dy = startY - (e.changedTouches?.[0]||e).clientY;
    startY = null;
    if(dy > 40) { fw?.classList.add('blown'); burst(160); }
  };
  $pg.addEventListener('pointerdown',  onStart, {passive:true});
  $pg.addEventListener('pointerup',    onEnd,   {passive:true});
  $pg.addEventListener('touchstart',   onStart, {passive:true});
  $pg.addEventListener('touchend',     onEnd,   {passive:true});
}
